name: ask-frederick-$(rev:r)

pool:
  name: RSConnect
  
trigger:
  branches:
    include:
    - main

  paths:
    exclude:
    - azure-pipelines.yml
    
resources:
  repositories:
    - repository: posit-deploy
      type: git
      name: ESFA-Data-Science/posit-deploy
      
extends:
  template: deploy.yml@posit-deploy
  parameters:
    appName: ask-frederick
    environments:
    - name: Pre-Production
      appId: none
    - name: Production
      appId: none
    approvers: |
     cameron.race@education.gov.uk
     laura.selby@education.gov.uk
